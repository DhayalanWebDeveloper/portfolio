<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C5A8A"/>
      <stop offset="100%" stop-color="#1480B8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2DA0D8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0C5A8A" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative large circles -->
  <circle cx="700" cy="60" r="130" fill="url(#accent)"/>
  <circle cx="120" cy="420" r="90" fill="url(#accent)"/>

  <!-- Decorative grid dots -->
  <g fill="white" opacity="0.07">
    <circle cx="620" cy="320" r="3"/><circle cx="660" cy="320" r="3"/><circle cx="700" cy="320" r="3"/><circle cx="740" cy="320" r="3"/>
    <circle cx="620" cy="360" r="3"/><circle cx="660" cy="360" r="3"/><circle cx="700" cy="360" r="3"/><circle cx="740" cy="360" r="3"/>
    <circle cx="620" cy="400" r="3"/><circle cx="660" cy="400" r="3"/><circle cx="700" cy="400" r="3"/><circle cx="740" cy="400" r="3"/>
  </g>

  <!-- Floating circles -->
  <circle cx="100" cy="100" r="5" fill="#3CD8C8" opacity="0.35"/>
  <circle cx="250" cy="50" r="3" fill="white" opacity="0.2"/>
  <circle cx="700" cy="280" r="4" fill="#2DA0D8" opacity="0.3"/>
  <circle cx="550" cy="400" r="6" fill="#3CD8C8" opacity="0.2"/>
  <circle cx="750" cy="200" r="3" fill="white" opacity="0.15"/>
  <circle cx="350" cy="420" r="4" fill="#2DA0D8" opacity="0.25"/>

  <!-- Decorative lines -->
  <line x1="50" y1="250" x2="170" y2="250" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="50" y1="270" x2="140" y2="270" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Medical Cross Icon -->
  <g transform="translate(400, 115)">
    <rect x="-10" y="-35" width="20" height="70" rx="4" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>
    <rect x="-35" y="-10" width="70" height="20" rx="4" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2"/>
  </g>

  <!-- Heart shape -->
  <g transform="translate(400, 115)" opacity="0.35">
    <path d="M-50,-55 C-50,-70 -35,-75 -25,-65 C-15,-75 0,-70 0,-55 C0,-40 -25,-20 -25,-20 C-25,-20 -50,-40 -50,-55Z" fill="#3CD8C8" transform="translate(-25, -10) scale(0.5)"/>
    <path d="M50,-55 C50,-70 65,-75 75,-65 C85,-75 100,-70 100,-55 C100,-40 75,-20 75,-20 C75,-20 50,-40 50,-55Z" fill="#3CD8C8" transform="translate(-25, -10) scale(0.5)"/>
  </g>

  <!-- Heartbeat line -->
  <g transform="translate(400, 130)" stroke="#3CD8C8" stroke-width="2" fill="none" opacity="0.4">
    <polyline points="-100,0 -70,0 -60,-15 -50,15 -40,-20 -30,20 -20,0 100,0"/>
  </g>

  <!-- Title -->
  <text x="400" y="255" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="6">HMS</text>

  <!-- Subtitle -->
  <text x="400" y="290" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="white" opacity="0.7" letter-spacing="2">Hospital Management</text>

  <!-- Bottom decorative bar -->
  <rect x="350" y="315" width="100" height="3" rx="1.5" fill="#3CD8C8" opacity="0.5"/>
</svg>