<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DA0D8"/>
      <stop offset="100%" stop-color="#50E8D8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0C5A8A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2DA0D8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative large circles -->
  <circle cx="680" cy="80" r="140" fill="url(#accent)"/>
  <circle cx="100" cy="380" r="100" fill="url(#accent)"/>

  <!-- Decorative grid dots -->
  <g fill="white" opacity="0.1">
    <circle cx="50" cy="50" r="2.5"/><circle cx="80" cy="50" r="2.5"/><circle cx="110" cy="50" r="2.5"/><circle cx="140" cy="50" r="2.5"/>
    <circle cx="50" cy="80" r="2.5"/><circle cx="80" cy="80" r="2.5"/><circle cx="110" cy="80" r="2.5"/><circle cx="140" cy="80" r="2.5"/>
    <circle cx="50" cy="110" r="2.5"/><circle cx="80" cy="110" r="2.5"/><circle cx="110" cy="110" r="2.5"/><circle cx="140" cy="110" r="2.5"/>
  </g>

  <!-- Floating circles -->
  <circle cx="720" cy="350" r="5" fill="white" opacity="0.2"/>
  <circle cx="200" cy="30" r="4" fill="#0C5A8A" opacity="0.2"/>
  <circle cx="550" cy="420" r="6" fill="white" opacity="0.15"/>
  <circle cx="750" cy="200" r="3" fill="#0C5A8A" opacity="0.2"/>
  <circle cx="350" cy="430" r="4" fill="white" opacity="0.15"/>
  <circle cx="100" cy="200" r="5" fill="#1480B8" opacity="0.2"/>

  <!-- Decorative lines -->
  <line x1="620" y1="280" x2="760" y2="280" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="640" y1="300" x2="740" y2="300" stroke="white" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Newspaper Icon -->
  <g transform="translate(370, 110)">
    <!-- Paper -->
    <rect x="-35" y="-40" width="70" height="80" rx="4" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
    <!-- Headline bar -->
    <rect x="-25" y="-30" width="50" height="8" rx="2" fill="white" opacity="0.4"/>
    <!-- Text lines -->
    <rect x="-25" y="-15" width="50" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="-25" y="-7" width="40" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="-25" y="1" width="45" height="3" rx="1" fill="white" opacity="0.2"/>
    <!-- Image placeholder -->
    <rect x="-25" y="10" width="22" height="18" rx="2" fill="white" opacity="0.15" stroke="white" stroke-width="1"/>
    <!-- More lines -->
    <rect x="3" y="12" width="22" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="3" y="20" width="18" height="3" rx="1" fill="white" opacity="0.2"/>
  </g>

  <!-- Globe shape -->
  <g transform="translate(460, 95)" stroke="white" stroke-width="1.5" fill="none" opacity="0.35">
    <circle cx="0" cy="0" r="22"/>
    <ellipse cx="0" cy="0" rx="10" ry="22"/>
    <line x1="-22" y1="0" x2="22" y2="0"/>
    <path d="M-20,-10 C-10,-8 10,-8 20,-10"/>
    <path d="M-20,10 C-10,8 10,8 20,10"/>
  </g>

  <!-- Title -->
  <text x="400" y="255" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="3">Dinamani</text>

  <!-- Subtitle -->
  <text x="400" y="290" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="white" opacity="0.7" letter-spacing="2">Tamil News Portal</text>

  <!-- Bottom decorative bar -->
  <rect x="350" y="315" width="100" height="3" rx="1.5" fill="white" opacity="0.4"/>
</svg>