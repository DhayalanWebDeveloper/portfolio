<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1480B8"/>
      <stop offset="100%" stop-color="#50E8D8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3CD8C8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1480B8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative large circles -->
  <circle cx="660" cy="90" r="150" fill="url(#accent)"/>
  <circle cx="100" cy="400" r="100" fill="url(#accent)"/>

  <!-- Decorative grid dots -->
  <g fill="white" opacity="0.08">
    <circle cx="40" cy="40" r="2.5"/><circle cx="70" cy="40" r="2.5"/><circle cx="100" cy="40" r="2.5"/><circle cx="130" cy="40" r="2.5"/><circle cx="160" cy="40" r="2.5"/>
    <circle cx="40" cy="70" r="2.5"/><circle cx="70" cy="70" r="2.5"/><circle cx="100" cy="70" r="2.5"/><circle cx="130" cy="70" r="2.5"/><circle cx="160" cy="70" r="2.5"/>
    <circle cx="40" cy="100" r="2.5"/><circle cx="70" cy="100" r="2.5"/><circle cx="100" cy="100" r="2.5"/><circle cx="130" cy="100" r="2.5"/><circle cx="160" cy="100" r="2.5"/>
  </g>

  <!-- Floating circles -->
  <circle cx="720" cy="350" r="6" fill="white" opacity="0.2"/>
  <circle cx="300" cy="30" r="4" fill="white" opacity="0.2"/>
  <circle cx="550" cy="410" r="5" fill="#1480B8" opacity="0.3"/>
  <circle cx="80" cy="200" r="3" fill="white" opacity="0.15"/>
  <circle cx="750" cy="180" r="4" fill="#3CD8C8" opacity="0.25"/>
  <circle cx="400" cy="420" r="3" fill="white" opacity="0.2"/>

  <!-- Decorative lines -->
  <line x1="630" y1="300" x2="760" y2="300" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="650" y1="320" x2="740" y2="320" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Robot Head Icon -->
  <g transform="translate(400, 105)">
    <!-- Head -->
    <rect x="-30" y="-30" width="60" height="50" rx="10" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-10" r="6" fill="white" opacity="0.6"/>
    <circle cx="12" cy="-10" r="6" fill="white" opacity="0.6"/>
    <circle cx="-12" cy="-10" r="3" fill="#1480B8"/>
    <circle cx="12" cy="-10" r="3" fill="#1480B8"/>
    <!-- Mouth -->
    <rect x="-15" y="5" width="30" height="4" rx="2" fill="white" opacity="0.4"/>
    <!-- Antenna -->
    <line x1="0" y1="-30" x2="0" y2="-45" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="-48" r="4" fill="#50E8D8" opacity="0.7"/>
    <!-- Ears -->
    <rect x="-38" y="-18" width="8" height="16" rx="3" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
    <rect x="30" y="-18" width="8" height="16" rx="3" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Gear shapes -->
  <g transform="translate(320, 90)" stroke="#50E8D8" stroke-width="1.5" fill="none" opacity="0.35">
    <circle cx="0" cy="0" r="15"/>
    <circle cx="0" cy="0" r="6"/>
    <line x1="0" y1="-18" x2="0" y2="-12"/><line x1="0" y1="12" x2="0" y2="18"/>
    <line x1="-18" y1="0" x2="-12" y2="0"/><line x1="12" y1="0" x2="18" y2="0"/>
    <line x1="-12" y1="-12" x2="-9" y2="-9"/><line x1="9" y1="9" x2="12" y2="12"/>
    <line x1="12" y1="-12" x2="9" y2="-9"/><line x1="-9" y1="9" x2="-12" y2="12"/>
  </g>
  <g transform="translate(490, 100)" stroke="#50E8D8" stroke-width="1.5" fill="none" opacity="0.3">
    <circle cx="0" cy="0" r="12"/>
    <circle cx="0" cy="0" r="5"/>
    <line x1="0" y1="-15" x2="0" y2="-9"/><line x1="0" y1="9" x2="0" y2="15"/>
    <line x1="-15" y1="0" x2="-9" y2="0"/><line x1="9" y1="0" x2="15" y2="0"/>
  </g>

  <!-- Title -->
  <text x="400" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="3">Agent 7X</text>

  <!-- Subtitle -->
  <text x="400" y="285" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="white" opacity="0.7" letter-spacing="2">AI Automation</text>

  <!-- Bottom decorative bar -->
  <rect x="350" y="310" width="100" height="3" rx="1.5" fill="#50E8D8" opacity="0.5"/>
</svg>