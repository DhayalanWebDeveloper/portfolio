<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C5A8A"/>
      <stop offset="100%" stop-color="#2DA0D8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3CD8C8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0C5A8A" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative large circles -->
  <circle cx="690" cy="90" r="130" fill="url(#accent)"/>
  <circle cx="90" cy="400" r="90" fill="url(#accent)"/>

  <!-- Decorative grid dots -->
  <g fill="white" opacity="0.07">
    <circle cx="600" cy="340" r="3"/><circle cx="640" cy="340" r="3"/><circle cx="680" cy="340" r="3"/><circle cx="720" cy="340" r="3"/><circle cx="760" cy="340" r="3"/>
    <circle cx="600" cy="380" r="3"/><circle cx="640" cy="380" r="3"/><circle cx="680" cy="380" r="3"/><circle cx="720" cy="380" r="3"/><circle cx="760" cy="380" r="3"/>
    <circle cx="600" cy="420" r="3"/><circle cx="640" cy="420" r="3"/><circle cx="680" cy="420" r="3"/><circle cx="720" cy="420" r="3"/><circle cx="760" cy="420" r="3"/>
  </g>

  <!-- Floating circles -->
  <circle cx="150" cy="60" r="5" fill="#3CD8C8" opacity="0.35"/>
  <circle cx="300" cy="30" r="3" fill="white" opacity="0.2"/>
  <circle cx="720" cy="250" r="4" fill="#50E8D8" opacity="0.25"/>
  <circle cx="550" cy="410" r="6" fill="#3CD8C8" opacity="0.2"/>
  <circle cx="80" cy="200" r="4" fill="white" opacity="0.15"/>
  <circle cx="450" cy="430" r="3" fill="white" opacity="0.2"/>

  <!-- Decorative lines -->
  <line x1="50" y1="300" x2="170" y2="300" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="50" y1="320" x2="140" y2="320" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Building Icon -->
  <g transform="translate(400, 105)">
    <!-- Main building -->
    <rect x="-25" y="-45" width="50" height="70" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
    <!-- Windows grid -->
    <rect x="-18" y="-38" width="10" height="8" rx="1" fill="white" opacity="0.3"/>
    <rect x="8" y="-38" width="10" height="8" rx="1" fill="white" opacity="0.3"/>
    <rect x="-18" y="-24" width="10" height="8" rx="1" fill="white" opacity="0.3"/>
    <rect x="8" y="-24" width="10" height="8" rx="1" fill="white" opacity="0.3"/>
    <rect x="-18" y="-10" width="10" height="8" rx="1" fill="white" opacity="0.3"/>
    <rect x="8" y="-10" width="10" height="8" rx="1" fill="white" opacity="0.3"/>
    <!-- Door -->
    <rect x="-7" y="8" width="14" height="17" rx="2" fill="white" opacity="0.25"/>
    <!-- Side building left -->
    <rect x="-50" y="-20" width="25" height="45" fill="white" fill-opacity="0.1" stroke="white" stroke-width="1.5"/>
    <rect x="-44" y="-14" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
    <rect x="-33" y="-14" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
    <rect x="-44" y="-4" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
    <rect x="-33" y="-4" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
    <!-- Side building right -->
    <rect x="25" y="-10" width="25" height="35" fill="white" fill-opacity="0.1" stroke="white" stroke-width="1.5"/>
    <rect x="31" y="-4" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
    <rect x="42" y="-4" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
    <rect x="31" y="6" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
    <rect x="42" y="6" width="6" height="5" rx="1" fill="white" opacity="0.2"/>
  </g>

  <!-- Grid pattern decoration -->
  <g transform="translate(400, 170)" stroke="#3CD8C8" stroke-width="0.8" fill="none" opacity="0.2">
    <rect x="-80" y="0" width="20" height="15"/>
    <rect x="-55" y="0" width="20" height="15"/>
    <rect x="-30" y="0" width="20" height="15"/>
    <rect x="30" y="0" width="20" height="15"/>
    <rect x="55" y="0" width="20" height="15"/>
  </g>

  <!-- Title -->
  <text x="400" y="260" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="3">L&amp;T Portal</text>

  <!-- Subtitle -->
  <text x="400" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="white" opacity="0.7" letter-spacing="2">Asset Management</text>

  <!-- Bottom decorative bar -->
  <rect x="350" y="320" width="100" height="3" rx="1.5" fill="#3CD8C8" opacity="0.5"/>
</svg>