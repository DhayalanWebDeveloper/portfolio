<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C5A8A"/>
      <stop offset="100%" stop-color="#2DA0D8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3CD8C8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2DA0D8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative large circle -->
  <circle cx="650" cy="80" r="120" fill="url(#accent)"/>
  <circle cx="100" cy="400" r="80" fill="url(#accent)"/>

  <!-- Decorative grid dots -->
  <g fill="white" opacity="0.08">
    <circle cx="50" cy="50" r="3"/><circle cx="90" cy="50" r="3"/><circle cx="130" cy="50" r="3"/><circle cx="170" cy="50" r="3"/>
    <circle cx="50" cy="90" r="3"/><circle cx="90" cy="90" r="3"/><circle cx="130" cy="90" r="3"/><circle cx="170" cy="90" r="3"/>
    <circle cx="50" cy="130" r="3"/><circle cx="90" cy="130" r="3"/><circle cx="130" cy="130" r="3"/><circle cx="170" cy="130" r="3"/>
  </g>

  <!-- Floating circles -->
  <circle cx="700" cy="350" r="6" fill="#3CD8C8" opacity="0.4"/>
  <circle cx="720" cy="100" r="4" fill="#50E8D8" opacity="0.3"/>
  <circle cx="150" cy="300" r="5" fill="#3CD8C8" opacity="0.35"/>
  <circle cx="600" cy="400" r="3" fill="white" opacity="0.2"/>
  <circle cx="250" cy="60" r="4" fill="#50E8D8" opacity="0.25"/>
  <circle cx="500" cy="30" r="3" fill="white" opacity="0.15"/>
  <circle cx="350" cy="420" r="5" fill="#3CD8C8" opacity="0.2"/>

  <!-- Decorative lines -->
  <line x1="620" y1="200" x2="750" y2="200" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="620" y1="220" x2="730" y2="220" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="620" y1="240" x2="710" y2="240" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Microphone Icon -->
  <g transform="translate(400, 140)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <!-- Mic body -->
    <rect x="-14" y="-50" width="28" height="45" rx="14" fill="white" fill-opacity="0.15" stroke="white"/>
    <!-- Mic arc -->
    <path d="M-22,0 C-22,18 -12,30 0,30 C12,30 22,18 22,0" />
    <!-- Mic stand -->
    <line x1="0" y1="30" x2="0" y2="45"/>
    <line x1="-12" y1="45" x2="12" y2="45"/>
  </g>

  <!-- Voice wave shapes -->
  <g transform="translate(400, 110)" stroke="#3CD8C8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M35,-20 C40,-10 40,10 35,20"/>
    <path d="M45,-30 C52,-15 52,15 45,30"/>
    <path d="M55,-40 C65,-20 65,20 55,40"/>
    <path d="M-35,-20 C-40,-10 -40,10 -35,20"/>
    <path d="M-45,-30 C-52,-15 -52,15 -45,30"/>
    <path d="M-55,-40 C-65,-20 -65,20 -55,40"/>
  </g>

  <!-- Title -->
  <text x="400" y="260" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="4">BE25</text>

  <!-- Subtitle -->
  <text x="400" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="white" opacity="0.7" letter-spacing="2">AI Interview Platform</text>

  <!-- Bottom decorative bar -->
  <rect x="350" y="320" width="100" height="3" rx="1.5" fill="#3CD8C8" opacity="0.5"/>
</svg>